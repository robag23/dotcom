<style>

/* Portfolio v6.1 embedded unified header — no external CSS dependency */
/* Portfolio v6 unified header + navigation */
:root{--v6-header-h:76px;--v6-control:44px;--v6-gap:12px;--v6-accent:#65d8ff;--v6-accent2:#ef9a72;--v6-header-bg:rgba(5,22,30,.94);--v6-line:rgba(144,203,222,.18);--v6-pill:rgba(18,47,59,.72)}
header.v6-header{position:sticky;top:0;z-index:1000;height:var(--v6-header-h);background:var(--v6-header-bg);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--v6-line)}
.v6-header-inner{width:min(1440px,calc(100% - 32px));height:100%;margin:auto;display:grid;grid-template-columns:minmax(180px,1fr) auto minmax(260px,1fr);align-items:center;gap:22px}
.v6-brand{display:inline-flex;align-items:center;gap:11px;min-width:0;color:var(--text,#fff);text-decoration:none;font-weight:800;letter-spacing:-.02em;white-space:nowrap}
.v6-brand img{width:38px;height:38px;border-radius:50%;object-fit:cover;border:1px solid rgba(101,216,255,.35)}
.v6-brand span{overflow:hidden;text-overflow:ellipsis}
.v6-nav{display:flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap}
.v6-nav a{position:relative;display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:0 13px;border:1px solid transparent;border-radius:999px;color:var(--muted,#b6c3c8);text-decoration:none;font-size:.88rem;font-weight:650;transition:.22s ease}
.v6-nav a:hover{color:var(--text,#fff);background:rgba(255,255,255,.035)}
.v6-nav a.active,.v6-nav a[aria-current="page"]{color:#fff;border-color:rgba(101,216,255,.55);background:linear-gradient(135deg,rgba(101,216,255,.17),rgba(101,216,255,.07));box-shadow:0 8px 24px rgba(0,0,0,.22),inset 0 0 0 1px rgba(255,255,255,.035)}
.v6-nav a.active:after,.v6-nav a[aria-current="page"]:after{content:"";position:absolute;left:50%;bottom:4px;width:18px;height:2px;border-radius:2px;background:var(--v6-accent);transform:translateX(-50%);box-shadow:0 0 10px rgba(101,216,255,.7)}
.v6-actions{display:flex;justify-content:flex-end;align-items:center;gap:var(--v6-gap);min-width:0}
.v6-language{display:flex;align-items:center;gap:6px;padding:3px;border:1px solid var(--v6-line);border-radius:999px;background:rgba(255,255,255,.025)}
.v6-language a{width:38px;height:38px;display:grid;place-items:center;border-radius:50%;text-decoration:none;color:var(--muted,#b6c3c8);font-size:.78rem;font-weight:800;transition:.2s}
.v6-language a:hover{color:#fff;background:rgba(255,255,255,.06)}
.v6-language a.active{background:#f5f7f7;color:#0b1b22;box-shadow:0 5px 16px rgba(0,0,0,.25)}
.v6-ai{height:44px;min-width:148px;padding:0 18px;border:1px solid rgba(135,197,218,.22);border-radius:999px;background:var(--v6-pill);color:#fff;font:inherit;font-weight:800;display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;white-space:nowrap;transition:.2s}
.v6-ai:hover{border-color:rgba(101,216,255,.55);transform:translateY(-1px);box-shadow:0 10px 22px rgba(0,0,0,.2)}
.v6-theme,.v6-toggle{width:44px;height:44px;min-width:44px;border-radius:50%;border:1px solid var(--v6-line);background:rgba(12,38,49,.8);color:#fff;display:grid;place-items:center;cursor:pointer}
.v6-toggle{display:none;position:relative}
.v6-toggle-bars,.v6-toggle-bars:before,.v6-toggle-bars:after{display:block;width:18px;height:2px;border-radius:2px;background:currentColor;transition:.22s}
.v6-toggle-bars:before,.v6-toggle-bars:after{content:"";position:absolute;left:12px}
.v6-toggle-bars:before{top:14px}.v6-toggle-bars:after{bottom:14px}
.v6-toggle[aria-expanded="true"] .v6-toggle-bars{background:transparent}
.v6-toggle[aria-expanded="true"] .v6-toggle-bars:before{top:21px;transform:rotate(45deg)}
.v6-toggle[aria-expanded="true"] .v6-toggle-bars:after{bottom:21px;transform:rotate(-45deg)}
.v6-drawer{position:fixed;inset:var(--v6-header-h) 0 0;z-index:999;visibility:hidden;pointer-events:none}
.v6-drawer.open{visibility:visible;pointer-events:auto}
.v6-drawer-backdrop{position:absolute;inset:0;background:rgba(0,10,15,.62);opacity:0;transition:.24s}
.v6-drawer.open .v6-drawer-backdrop{opacity:1}
.v6-drawer-panel{position:absolute;top:12px;right:14px;width:min(380px,calc(100% - 28px));max-height:calc(100dvh - var(--v6-header-h) - 24px);overflow:auto;padding:14px;border:1px solid rgba(126,194,217,.22);border-radius:24px;background:rgba(7,27,36,.98);box-shadow:0 30px 80px rgba(0,0,0,.46);transform:translateY(-12px) scale(.98);opacity:0;transition:.24s}
.v6-drawer.open .v6-drawer-panel{transform:none;opacity:1}
.v6-mobile-nav{display:grid;gap:7px}
.v6-mobile-nav a{display:flex;align-items:center;justify-content:space-between;min-height:50px;padding:0 16px;border:1px solid transparent;border-radius:15px;color:var(--muted,#b6c3c8);text-decoration:none;font-weight:750}
.v6-mobile-nav a.active,.v6-mobile-nav a[aria-current="page"]{color:#fff;border-color:rgba(101,216,255,.42);background:linear-gradient(135deg,rgba(101,216,255,.16),rgba(101,216,255,.05));box-shadow:inset 3px 0 0 var(--v6-accent)}
.v6-mobile-bottom{display:grid;grid-template-columns:1fr auto;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--v6-line)}
.v6-mobile-bottom .v6-ai{width:100%}
.v6-mobile-langs{display:flex;gap:6px}
.v6-mobile-langs a{width:44px;height:44px;display:grid;place-items:center;border:1px solid var(--v6-line);border-radius:50%;color:#fff;text-decoration:none;font-weight:800}
.v6-mobile-langs a.active{background:#f5f7f7;color:#0b1b22}
@media(max-width:1180px){.v6-header-inner{grid-template-columns:1fr auto;gap:12px}.v6-nav,.v6-actions>.v6-language,.v6-actions>.v6-ai{display:none}.v6-toggle{display:grid}.v6-actions{grid-column:2}.v6-brand span{max-width:180px}}
@media(max-width:600px){:root{--v6-header-h:70px}.v6-header-inner{width:calc(100% - 22px)}.v6-brand img{width:36px;height:36px}.v6-brand span{font-size:.95rem;max-width:150px}.v6-theme,.v6-toggle{width:42px;height:42px;min-width:42px}.v6-actions{gap:8px}}
@media(max-width:390px){.v6-brand span{display:none}}

</style>
</head><body data-v6-page="scholar"><p>Redirecting to <a href="https://scholar.google.com/citations?user=Vl5uVM0AAAAJ&hl=en">Google Scholar</a>…</p>

<script>
/* Portfolio v6.1 embedded unified header JS — no external JS dependency */
(()=>{
 const toggle=document.querySelector('.v6-toggle'); const drawer=document.getElementById('v6Drawer');
 if(toggle&&drawer){const close=()=>{drawer.classList.remove('open');toggle.setAttribute('aria-expanded','false');document.body.style.overflow=''};
 toggle.addEventListener('click',()=>{const o=!drawer.classList.contains('open');drawer.classList.toggle('open',o);toggle.setAttribute('aria-expanded',String(o));document.body.style.overflow=o?'hidden':''});
 drawer.querySelector('.v6-drawer-backdrop')?.addEventListener('click',close);drawer.querySelectorAll('a,.v6-ai').forEach(x=>x.addEventListener('click',close));document.addEventListener('keydown',e=>{if(e.key==='Escape')close()});}
 const themeOld=document.getElementById('theme'); const themeNew=document.getElementById('v6Theme');
 if(themeNew){themeNew.addEventListener('click',()=>{if(themeOld) themeOld.click(); else {document.documentElement.classList.toggle('light');localStorage.setItem('theme',document.documentElement.classList.contains('light')?'light':'dark')}})}
 if(document.body.dataset.v6Page==='home'){
  const links=[...document.querySelectorAll('.v6-nav a[data-section],.v6-mobile-nav a[data-section]')];
  const sections=['home','journey','projects'].map(id=>document.getElementById(id)).filter(Boolean);
  if(sections.length){const set=id=>links.forEach(a=>{const on=a.dataset.section===id;a.classList.toggle('active',on);if(on)a.setAttribute('aria-current','page');else a.removeAttribute('aria-current')});
  const obs=new IntersectionObserver(es=>{const v=es.filter(e=>e.isIntersecting).sort((a,b)=>b.intersectionRatio-a.intersectionRatio)[0];if(v)set(v.target.id)},{rootMargin:'-25% 0px -55%',threshold:[.05,.2,.5]});sections.forEach(s=>obs.observe(s));}
 }
})();
</script>
