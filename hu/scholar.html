/* v5 active navigation state: clear on desktop and mobile */
.navlinks a,.mobile-panel nav a{position:relative;transition:color .22s ease,background .22s ease,border-color .22s ease,box-shadow .22s ease,transform .22s ease}
.navlinks a{padding:9px 13px;border:1px solid transparent;border-radius:999px}
.navlinks a:hover{color:var(--text);background:color-mix(in srgb,var(--solid) 72%,transparent);border-color:var(--line);transform:translateY(-1px)}
.navlinks a.active,.navlinks a[aria-current="page"]{color:var(--text);background:linear-gradient(135deg,color-mix(in srgb,var(--accent2) 18%,var(--solid)),color-mix(in srgb,var(--accent) 10%,var(--solid)));border-color:color-mix(in srgb,var(--accent2) 38%,var(--line));box-shadow:0 8px 22px rgba(8,35,51,.13),inset 0 1px 0 rgba(255,255,255,.55);font-weight:850}
.navlinks a.active:after,.navlinks a[aria-current="page"]:after{content:"";position:absolute;left:50%;bottom:3px;width:18px;height:2px;border-radius:99px;background:var(--accent2);transform:translateX(-50%)}
.mobile-panel nav a.active,.mobile-panel nav a[aria-current="page"]{color:var(--text);background:linear-gradient(135deg,color-mix(in srgb,var(--accent2) 17%,var(--solid)),color-mix(in srgb,var(--accent) 9%,var(--solid)));border:1px solid color-mix(in srgb,var(--accent2) 40%,var(--line));box-shadow:0 10px 24px rgba(8,35,51,.14);transform:translateX(3px);font-weight:850}
.mobile-panel nav a.active i,.mobile-panel nav a[aria-current="page"] i{color:var(--accent2)}
.document-language-row{display:flex;flex-wrap:wrap;gap:9px;margin-top:16px}.document-language-row .btn{flex:1;min-width:132px}.doc-language-label{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:850;margin-top:15px}


/* v5.4 HU mobile menu spacing fix */
@media (max-width:1050px){
  .mobile-panel nav{padding-bottom:10px!important;}
  .mobile-panel .mobile-tools{
    display:flex!important;
    justify-content:flex-end!important;
    align-items:center!important;
    gap:10px!important;
    margin-top:14px!important;
    padding:16px 4px 3px!important;
    border-top:1px solid color-mix(in srgb,var(--accent2) 28%,var(--line))!important;
  }
  .mobile-panel .mobile-tools::before{
    content:"Nyelv";
    margin-right:auto;
    padding-left:8px;
    color:var(--muted);
    font-size:.72rem;
    font-weight:850;
    letter-spacing:.1em;
    text-transform:uppercase;
  }
  .mobile-panel .mobile-tools .language-switch{
    width:44px!important;
    height:44px!important;
    min-width:44px!important;
    border:1px solid var(--line)!important;
    background:var(--solid)!important;
    box-shadow:0 6px 16px rgba(8,35,51,.08)!important;
  }
  .mobile-panel .mobile-tools .language-switch.active-language{
    background:var(--text)!important;
    color:var(--bg)!important;
    border-color:var(--text)!important;
  }
}
